name: Slack DM Relay

on:
  push:
    branches: [main]
    paths:
      - 'notify/**.json'

jobs:
  send-dm:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Find notify file
        id: find
        run: |
          set -e
          FILE=$(git diff --name-only HEAD~1 HEAD | grep '^notify/.*\.json$' | head -1 || true)
          if [ -z "$FILE" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "file=$FILE" >> "$GITHUB_OUTPUT"
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "Found: $FILE"
          fi

      - name: Send Slack DM
        if: steps.find.outputs.skip == 'false'
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
        run: |
          set -e
          FILE="${{ steps.find.outputs.file }}"
          [ -z "$SLACK_BOT_TOKEN" ] && { echo "::error::SLACK_BOT_TOKEN not set"; exit 1; }

          CHANNEL=$(jq -r '.channel' "$FILE")
          TEXT=$(jq -r '.text' "$FILE")

          RESPONSE=$(curl -s -X POST https://slack.com/api/chat.postMessage \
            -H "Authorization: Bearer $SLACK_BOT_TOKEN" \
            -H "Content-Type: application/json; charset=utf-8" \
            --data "$(jq -n --arg channel "$CHANNEL" --arg text "$TEXT" '{channel: $channel, text: $text}')")
          echo "$RESPONSE"

          OK=$(echo "$RESPONSE" | jq -r '.ok')
          [ "$OK" != "true" ] && { echo "::error::Slack: $(echo "$RESPONSE" | jq -r '.error')"; exit 1; }
          echo "DM sent ts=$(echo "$RESPONSE" | jq -r '.ts')"
